version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: carpooling_db
    environment:
      POSTGRES_USER: carpooling_user
      POSTGRES_PASSWORD: carpooling_password
      POSTGRES_DB: carpool
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carpooling_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: carpooling_app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://carpooling_user:carpooling_password@db:5432/carpool
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: